<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Advanced Calculator Pro</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

<div class="container">

    <header>
        <h1>Advanced Calculator</h1>

        <button id="theme-toggle">
            ☀
        </button>
    </header>


    <div class="app">


        <!-- Calculator -->

        <section class="calculator">


            <input 
                type="text"
                id="display"
                placeholder="0"
                readonly
            >


            <div class="buttons">


                <button class="action">C</button>
                <button class="action">⌫</button>
                <button>%</button>
                <button>/</button>


                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>*</button>


                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>-</button>


                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>+</button>


                <button>0</button>
                <button>.</button>
                <button class="equal">=</button>


            </div>



            <div class="scientific">

                <button>sin</button>
                <button>cos</button>
                <button>tan</button>

                <button>sqrt</button>
                <button>log</button>
                <button>π</button>

            </div>


        </section>




        <!-- History -->


        <section class="history">

            <h2>
                History
            </h2>


            <ul id="history-list">

            </ul>


            <button id="clear-history">
                Clear
            </button>


        </section>



    </div>


</div>



<script src="script.js"></script>


</body>

</html>
